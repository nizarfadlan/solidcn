name: Deploy Docs to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "packages/core/**"
      - "packages/toast/**"
      - "packages/themes/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @solidcn/core build
          pnpm --filter @solidcn/toast build
          pnpm --filter @solidcn/themes build

      - name: Build docs
        run: pnpm --filter @solidcn/docs build
        env:
          VITE_STORYBOOK_URL: ${{ vars.STORYBOOK_URL || 'https://storybook.solidcn.nizarfadlan.dev' }}

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy apps/docs/.output/public --project-name=solidcn
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
