name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual publish)"
        type: boolean
        default: false

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # for creating git tags
      id-token: write # for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build in dependency order
      - name: Build @solidcn/themes
        run: pnpm --filter @solidcn/themes build

      - name: Build @solidcn/core
        run: pnpm --filter @solidcn/core build

      - name: Build @solidcn/toast
        run: pnpm --filter @solidcn/toast build

      - name: Build solidcn (CLI)
        run: pnpm --filter solidcn build

      - name: Build create-solidcn-app
        run: pnpm --filter create-solidcn-app build

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Dry run to validate package contents
      - name: Dry run — @solidcn/themes
        run: pnpm --filter @solidcn/themes exec npm pack --dry-run

      - name: Dry run — @solidcn/core
        run: pnpm --filter @solidcn/core exec npm pack --dry-run

      - name: Dry run — @solidcn/toast
        run: pnpm --filter @solidcn/toast exec npm pack --dry-run

      - name: Dry run — solidcn (CLI)
        run: pnpm --filter solidcn exec npm pack --dry-run

      - name: Dry run — create-solidcn-app
        run: pnpm --filter create-solidcn-app exec npm pack --dry-run

      # Check if package is already published
      - name: Check published status
        id: check
        run: |
          check_published() {
            local name=$1
            local pkg_version=$(node -p "require('./packages/$2/package.json').version")
            local published=$(npm view $name version 2>/dev/null || echo "none")
            echo "PUBLISHED_${3}=$([ "$published" = "$pkg_version" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
            echo "VERSION_${3}=${pkg_version}" >> $GITHUB_OUTPUT
          }
          check_published "@solidcn/themes" themes THEMES
          check_published "@solidcn/core" core CORE
          check_published "@solidcn/toast" toast TOAST
          check_published "solidcn" cli CLI
          check_published "create-solidcn-app" create-solidcn-app CREATE_APP

      # Publish (skipped if dry_run is true)
      - name: Publish @solidcn/themes
        if: ${{ !inputs.dry_run && steps.check.outputs.PUBLISHED_THEMES != 'true' }}
        run: pnpm --filter @solidcn/themes exec npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidcn/core
        if: ${{ !inputs.dry_run && steps.check.outputs.PUBLISHED_CORE != 'true' }}
        run: pnpm --filter @solidcn/core exec npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidcn/toast
        if: ${{ !inputs.dry_run && steps.check.outputs.PUBLISHED_TOAST != 'true' }}
        run: pnpm --filter @solidcn/toast exec npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish solidcn (CLI)
        if: ${{ !inputs.dry_run && steps.check.outputs.PUBLISHED_CLI != 'true' }}
        run: pnpm --filter solidcn exec npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-solidcn-app
        if: ${{ !inputs.dry_run && steps.check.outputs.PUBLISHED_CREATE_APP != 'true' }}
        run: pnpm --filter create-solidcn-app exec npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag & Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          declare -a TAGS=()

          tag_and_release() {
            local name=$1
            local pkg_dir=$2
            local published=$3
            local version=$4

            if [ "$published" != "true" ]; then
              local tag="${name}@${version}"
              echo "Processing: $tag"

              # Extract changelog section for this version from CHANGELOG.md
              local changelog="${pkg_dir}/CHANGELOG.md"
              local safe_name="${name//\//@}"
              local notes_file="/tmp/release-notes-${safe_name}.md"

              if [ -f "$changelog" ]; then
                # Extract content between "## <version>" and next "## " heading
                awk -v ver="$version" '
                  $0 ~ "^## "ver" " { found=1; next }
                  found && $0 ~ "^## " { exit }
                  found { print }
                ' "$changelog" > "$notes_file"

                if [ -s "$notes_file" ]; then
                  echo "Using CHANGELOG.md notes for ${name}@${version}"
                  gh release create "$tag" \
                    --target main \
                    --title "$tag" \
                    --notes-file "$notes_file"
                else
                  echo "Changelog section empty for ${name}@${version}, falling back to auto-generated notes"
                  gh release create "$tag" \
                    --target main \
                    --title "$tag" \
                    --generate-notes
                fi
              else
                echo "No CHANGELOG.md for ${name}, falling back to auto-generated notes"
                gh release create "$tag" \
                  --target main \
                  --title "$tag" \
                  --generate-notes
              fi
            fi
          }

          tag_and_release "@solidcn/themes" "packages/themes" "${{ steps.check.outputs.PUBLISHED_THEMES }}" "${{ steps.check.outputs.VERSION_THEMES }}"
          tag_and_release "@solidcn/core" "packages/core" "${{ steps.check.outputs.PUBLISHED_CORE }}" "${{ steps.check.outputs.VERSION_CORE }}"
          tag_and_release "@solidcn/toast" "packages/toast" "${{ steps.check.outputs.PUBLISHED_TOAST }}" "${{ steps.check.outputs.VERSION_TOAST }}"
          tag_and_release "solidcn" "packages/cli" "${{ steps.check.outputs.PUBLISHED_CLI }}" "${{ steps.check.outputs.VERSION_CLI }}"
          tag_and_release "create-solidcn-app" "packages/create-solidcn-app" "${{ steps.check.outputs.PUBLISHED_CREATE_APP }}" "${{ steps.check.outputs.VERSION_CREATE_APP }}"

          if [ ${#TAGS[@]} -eq 0 ]; then
            echo "No new packages to tag."
          fi
